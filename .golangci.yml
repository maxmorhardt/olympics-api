version: "2"

linters:
  settings:
    staticcheck:
      # keep staticcheck defaults, but skip SA1029: our context keys are
      # namespaced string constants shared with the gin context store
      checks:
        - all
        - -SA1029
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022
